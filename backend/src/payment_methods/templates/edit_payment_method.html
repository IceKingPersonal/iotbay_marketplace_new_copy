{% extends "base.html" %}
{% block content %}

<h2>Edit Payment Method</h2>

<form method="POST">

    <label>Type:</label>
    <select name="type" required>
        <option value="Credit Card" {% if method.type == "Credit Card" %}selected{% endif %}>Credit Card</option>
        <option value="Bank Account" {% if method.type == "Bank Account" %}selected{% endif %}>Bank Account</option>
    </select>

    <h3>Credit Card Info</h3>
    <label>Card Number:</label>
    <input type="text" name="card_number" value="{{ method.card_number }}">

    <label>Expiry Date (MM/YY):</label>
    <input type="text" name="expiry_date" value="{{ method.expiry_date }}">

    <label>CVV:</label>
    <input type="text" name="cvv" value="{{ method.cvv }}">

    <h3>Bank Account Info</h3>
    <label>BSB:</label>
    <input type="text" name="bsb" value="{{ method.bsb }}">

    <label>Account Number:</label>
    <input type="text" name="account_number" value="{{ method.account_number }}">

    <button type="submit">Save Changes</button>
</form>

{% endblock %}
